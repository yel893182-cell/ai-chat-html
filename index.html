<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天助手 Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: #0a0e27;
            color: #e0f7ff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 粒子背景 */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部导航 */
        header {
            border-bottom: 1px solid rgba(45, 53, 97, 0.5);
            background: rgba(26, 31, 58, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #8338ec, #ff006e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation: glowPulse 2s ease-in-out infinite;
        }

        .title-section h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-section p {
            font-size: 12px;
            color: #a8b5d1;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .lang-toggle {
            display: flex;
            gap: 5px;
            background: rgba(45, 53, 97, 0.3);
            border-radius: 8px;
            padding: 5px;
            border: 1px solid rgba(45, 53, 97, 0.5);
        }

        .lang-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #a8b5d1;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #00d4ff, #8338ec);
            color: white;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        /* 主聊天区域 */
        .chat-container {
            display: flex;
            flex: 1;
            gap: 15px;
            padding: 15px;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            border-right: 1px solid rgba(45, 53, 97, 0.5);
            background: rgba(26, 31, 58, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #8338ec, #ff006e);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .history-title {
            font-size: 12px;
            font-weight: 600;
            color: #a8b5d1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            border-radius: 8px;
            background: rgba(45, 53, 97, 0.2);
            border: 1px solid rgba(45, 53, 97, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            color: #e0f7ff;
            word-break: break-word;
        }

        .history-item:hover {
            background: rgba(45, 53, 97, 0.4);
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .history-item.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        /* 主聊天区域 */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(26, 31, 58, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(45, 53, 97, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .empty-text {
            color: #a8b5d1;
            font-size: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #8338ec);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.5);
            order: 2;
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.8), rgba(45, 53, 97, 0.4));
            backdrop-filter: blur(10px);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(131, 56, 236, 0.3));
            border-color: rgba(0, 212, 255, 0.5);
        }

        .message-content:hover {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        /* 输入区域 */
        .input-area {
            border-top: 1px solid rgba(45, 53, 97, 0.5);
            background: rgba(26, 31, 58, 0.3);
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(26, 31, 58, 0.6);
            color: #e0f7ff;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5), inset 0 0 10px rgba(0, 212, 255, 0.1);
            background: rgba(26, 31, 58, 0.8);
        }

        input[type="text"]::placeholder {
            color: #a8b5d1;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #8338ec, #ff006e);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            width: 100%;
        }

        /* 动画 */
        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(131, 56, 236, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.8), 0 0 40px rgba(131, 56, 236, 0.6);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 31, 58, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-container {
                gap: 10px;
                padding: 10px;
            }

            header {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <!-- 顶部导航 -->
        <header>
            <div class="header-left">
                <div class="logo">✨</div>
                <div class="title-section">
                    <h1>AI 聊天助手 Pro</h1>
                    <p>由 MiMo 大模型驱动</p>
                </div>
            </div>
            <div class="header-right">
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="zh">中文</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </header>

        <!-- 主聊天区域 -->
        <div class="chat-container">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+</span>
                    <span id="newChatText">新建对话</span>
                </button>
                <div class="history-title" id="historyTitle">历史记录</div>
                <div class="history-list" id="historyList"></div>
            </div>

            <!-- 主聊天区域 -->
            <div class="main-chat">
                <div class="messages" id="messages">
                    <div class="empty-state">
                        <div class="empty-icon">🚀</div>
                        <div class="empty-text" id="emptyText">开始对话吧！</div>
                    </div>
                </div>

                <!-- 输入区域 -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="messageInput" 
                            placeholder="输入你的问题..."
                            autocomplete="off"
                        >
                        <button id="sendBtn">
                            <span>→</span>
                            <span id="sendText">发送</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 粒子背景 ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.3;
                const colors = ['#00d4ff', '#ff006e', '#8338ec', '#ffbe0b', '#fb5607'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.life = 0;
                this.maxLife = Math.random() * 100 + 50;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                if (this.life > this.maxLife) {
                    return new Particle();
                }
                return this;
            }

            draw() {
                const progress = this.life / this.maxLife;
                const alpha = this.opacity * Math.sin(progress * Math.PI);

                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初始化粒子
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.map(p => p.update());
            particles.forEach(p => p.draw());

            // 绘制连接线
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.globalAlpha = 0.1 * (1 - distance / 150);
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            ctx.globalAlpha = 1;
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ==================== 聊天功能 ====================
        const API_KEY = 'sk-c3gs45vbc6ha1qs0akck494k9eerv7snmtydzbx6l0zkbf2w';
        const API_URL = 'https://api.xiaomimimo.com/v1/chat/completions';

        // 翻译
        const translations = {
            zh: {
                newChat: '新建对话',
                history: '历史记录',
                empty: '开始对话吧！',
                placeholder: '输入你的问题...',
                send: '发送',
                clear: '清空',
                thinking: '思考中...',
                error: '❌ 请求失败，请检查网络连接'
            },
            en: {
                newChat: 'New Chat',
                history: 'History',
                empty: 'Start a conversation!',
                placeholder: 'Ask me anything...',
                send: 'Send',
                clear: 'Clear',
                thinking: 'Thinking...',
                error: '❌ Request failed. Please check your network connection'
            }
        };

        let currentLang = 'zh';
        let conversations = [];
        let currentConversationId = null;

        // 更新翻译
        function updateTranslations() {
            document.getElementById('newChatText').textContent = translations[currentLang].newChat;
            document.getElementById('historyTitle').textContent = translations[currentLang].history;
            document.getElementById('emptyText').textContent = translations[currentLang].empty;
            document.getElementById('messageInput').placeholder = translations[currentLang].placeholder;
            document.getElementById('sendText').textContent = translations[currentLang].send;
        }

        // 语言切换
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateTranslations();
            });
        });

        // 创建新对话
        function createNewConversation() {
            const conversation = {
                id: Date.now().toString(),
                title: `对话 - ${new Date().toLocaleTimeString()}`,
                messages: []
            };
            conversations.unshift(conversation);
            currentConversationId = conversation.id;
            renderHistory();
            clearMessages();
        }

        // 获取当前对话
        function getCurrentConversation() {
            return conversations.find(c => c.id === currentConversationId);
        }

        // 渲染历史列表
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = `history-item ${conv.id === currentConversationId ? 'active' : ''}`;
                item.textContent = conv.title;
                item.addEventListener('click', () => {
                    currentConversationId = conv.id;
                    renderHistory();
                    renderMessages();
                });
                historyList.appendChild(item);
            });
        }

        // 清空消息显示
        function clearMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🚀</div>
                    <div class="empty-text">${translations[currentLang].empty}</div>
                </div>
            `;
        }

        // 渲染消息
        function renderMessages() {
            const conversation = getCurrentConversation();
            const messagesDiv = document.getElementById('messages');

            if (!conversation || conversation.messages.length === 0) {
                clearMessages();
                return;
            }

            messagesDiv.innerHTML = '';
            conversation.messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'user' : ''}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.role === 'user' ? '👤' : 'AI';

                const content = document.createElement('div');
                content.className = 'message-content';
                content.textContent = msg.content;

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(content);
                messagesDiv.appendChild(messageDiv);
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            if (!currentConversationId) {
                createNewConversation();
            }

            const conversation = getCurrentConversation();
            conversation.messages.push({
                role: 'user',
                content: text
            });

            input.value = '';
            renderMessages();

            // 显示思考中
            const messagesDiv = document.getElementById('messages');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message';
            thinkingDiv.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">${translations[currentLang].thinking}</div>
            `;
            messagesDiv.appendChild(thinkingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'mimo-v2.5',
                        messages: [{ role: 'user', content: text }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;

                conversation.messages.push({
                    role: 'assistant',
                    content: reply
                });

                renderMessages();
            } catch (error) {
                console.error('Error:', error);
                thinkingDiv.querySelector('.message-content').textContent = translations[currentLang].error;
            }
        }

        // 事件监听
        document.getElementById('newChatBtn').addEventListener('click', createNewConversation);

        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        updateTranslations();
        createNewConversation();
    </script>
</body>
</html>
